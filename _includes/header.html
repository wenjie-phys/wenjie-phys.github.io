<style>
  /* FIXED HEADER ANCHOR: This forces the top alignment to be pixel-perfect */
  header, section {
    display: block !important;
    float: none !important;
    width: 100% !important;
    margin: 0 !important;
    padding: 0 !important; /* Removes theme-specific vertical padding */
  }

  .wrapper {
    max-width: 1000px !important;
    margin: 0 auto !important;
    padding: 60px 40px 20px 40px !important; /* This is the ONLY place that sets the top height (60px) */
  }

  /* DYNAMICAL HOVER EFFECT */
  .header-link {
    text-decoration: none !important;
    transition: font-weight 0.2s ease-in-out;
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start; 
    font-family: 'EB Garamond', Garamond, serif;
  }

  .header-link::after {
    display: block;
    content: attr(title);
    font-weight: 800;
    height: 0;
    overflow: hidden;
    visibility: hidden;
  }

  .header-link:hover { font-weight: 400 !important; }

  .site-title {
    font-size: 38px;
    font-weight: 800 !important;
    color: #111 !important;
  }

  nav a {
    font-weight: 700 !important;
    font-size: 19px;
    color: #333 !important;
  }
</style>

<div style="display: flex; flex-direction: column; width: 100%; margin-bottom: 20px;">
    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <h1 style="margin: 0; line-height: 1;">
            <a href="/" class="header-link site-title" title="Wenjie Ji">Wenjie Ji</a>
        </h1>

        <nav style="display: flex; gap: 30px; line-height: 1; padding-top: 10px;">
            <a href="/cv" class="header-link" title="CV">CV</a>
            <a href="/publications" class="header-link" title="Publications">Publications</a>
            <a href="/research" class="header-link" title="Research">Research</a>
            <a href="/group" class="header-link" title="Group">Group</a>
            <a href="/join" class="header-link" title="Join">Join</a>
        </nav>
    </div>

    {% if page.url == "/" or page.url == "/index.html" %}
    <div style="margin-top: 30px;"> 
        <p style="margin: 0; color: #111; font-size: 18px; font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: bold;">
            Associate Professor, Westlake University
        </p>
        <div style="margin-top: 5px;">
            <a href="YOUR_SCHOLAR_URL" style="color: #3b71ca; font-size: 15px; text-decoration: none; font-family: 'Helvetica Neue', Arial, sans-serif;">Google Scholar</a>
        </div>
    </div>
    {% endif %}
</div>
