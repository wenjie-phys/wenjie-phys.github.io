<style>
  /* 1. Base Styles */
  .header-link {
    text-decoration: none !important;
    transition: font-weight 0.2s ease-in-out;
    display: inline-flex;
    flex-direction: column;
    /* Aligns the visible text and the 'ghost' text to the start (left) */
    align-items: flex-start; 
    font-family: 'EB Garamond', Garamond, serif;
  }

  /* 2. The "Ghost" Trick: Reserves space for the bold version */
  .header-link::after {
    display: block;
    content: attr(title);
    font-weight: 800; /* Uses the boldest weight to set the width */
    height: 0;
    overflow: hidden;
    visibility: hidden;
  }

  /* 3. The Dynamical Effect (Bold to Normal) */
  .header-link:hover {
    font-weight: 400 !important;
  }

  /* 4. Name Styling */
  .site-title {
    font-size: 38px;
    font-weight: 800 !important;
    color: #111 !important;
  }

  /* 5. Navigation Styling */
  nav a {
    font-weight: 700 !important;
    font-size: 19px;
    color: #333 !important;
  }
</style>

<div style="display: flex; flex-direction: column; width: 100%; margin-bottom: 40px;">
    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        
        <h1 style="margin: 0; line-height: 1;">
            <a href="/" class="header-link site-title" title="Wenjie Ji">Wenjie Ji</a>
        </h1>

        <nav style="display: flex; gap: 30px; line-height: 1; padding-top: 10px;">
            <a href="/cv" class="header-link" title="CV">CV</a>
            <a href="/research" class="header-link" title="Research">Research</a>
            <a href="/group" class="header-link" title="Group">Group</a>
            <a href="/join" class="header-link" title="Join">Join</a>
        </nav>
    </div>

    {% if page.url == "/" or page.url == "/index.html" %}
    <div style="margin-top: 50px;"> 
        <p style="margin: 0; color: #111; font-weight: 600; font-size: 16px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;">Associate Professor, Westlake University</p>
        <div style="margin-top: 5px;">
            <a href="https://scholar.google.com/citations?user=bVjt0QwAAAAJ&hl=en" style="color: #3b71ca; text-decoration: none; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 15px;">Google Scholar</a>
        </div>
    </div>
    {% endif %}
  
</div>
